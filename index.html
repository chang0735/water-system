<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>水站管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh;color:#333}

.header{background:linear-gradient(135deg,#1890ff,#096dd9);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:600}.header .user{font-size:13px;opacity:.9}
.header button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:4px;font-size:13px;cursor:pointer;transition:background .2s}
.header button:hover{background:rgba(255,255,255,.35)}

.nav{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;overflow-x:auto;position:sticky;top:48px;z-index:49}
.nav button{flex:1;min-width:60px;padding:12px 8px;border:none;background:none;font-size:13px;cursor:pointer;white-space:nowrap;color:#666;border-bottom:2px solid transparent;transition:all .2s}
.nav button:hover{color:#1890ff}
.nav button.active{color:#1890ff;border-bottom-color:#1890ff;font-weight:600}

.page{padding:12px;display:none}.page.active{display:block}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat{padding:14px 12px;border-radius:8px;text-align:center}
.stat .val{font-size:24px;font-weight:700}.stat .lbl{font-size:12px;color:#666;margin-top:2px}
.stat.blue{background:#e6f7ff;border:1px solid #91d5ff}
.stat.green{background:#f6ffed;border:1px solid #b7eb8f}
.stat.orange{background:#fff7e6;border:1px solid #ffd591}
.stat.red{background:#fff1f0;border:1px solid #ffa39e}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{background:#fafafa;padding:10px 8px;text-align:left;border-bottom:2px solid #e8e8e8;white-space:nowrap;font-weight:600}
td{padding:10px 8px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafafa}

.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:13px;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-blue{background:#1890ff;color:#fff}.btn-green{background:#52c41a;color:#fff}
.btn-red{background:#ff4d4f;color:#fff}.btn-gray{background:#d9d9d9;color:#333}
.btn-sm{padding:3px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center;padding:10px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;transition:border-color .2s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1890ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}

.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-pending{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}
.badge-ready{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.badge-delivering{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e}
.badge-done{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
.badge-cancelled{background:#f5f5f5;color:#999;border:1px solid #d9d9d9}

.status-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.status-bar .sb-item{flex:1;min-width:55px;text-align:center;padding:8px 4px;border-radius:6px;font-size:11px;background:#f5f5f5;cursor:pointer;transition:all .2s;border:2px solid transparent;user-select:none}
.status-bar .sb-item:hover{background:#e6f7ff}
.status-bar .sb-item.active{background:#1890ff;color:#fff;border-color:#1890ff;font-weight:600}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal-content{background:#fff;border-radius:12px;padding:24px;width:92%;max-width:520px;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
.modal-content h3{margin-bottom:16px;font-size:18px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

.login-box{max-width:380px;margin:60px auto;padding:36px 28px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.login-box h2{text-align:center;margin-bottom:4px;font-size:24px}
.login-box .sub{text-align:center;color:#999;font-size:14px;margin-bottom:24px}
.role-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.role-btn{padding:16px 8px;border:2px solid #e8e8e8;border-radius:8px;background:#fff;text-align:center;cursor:pointer;font-size:13px;transition:all .2s}
.role-btn:hover{border-color:#91d5ff}
.role-btn.selected{border-color:#1890ff;background:#e6f7ff;box-shadow:0 0 0 2px rgba(24,144,255,.2)}

.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:toastIn .3s;max-width:320px;cursor:pointer}
.toast-success{background:#52c41a}.toast-error{background:#ff4d4f}
.toast-info{background:#1890ff}.toast-warning{background:#fa8c16}
@keyframes toastIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

.loading{text-align:center;padding:40px;color:#999}
.loading::after{content:'';display:inline-block;width:24px;height:24px;border:3px solid #e8e8e8;border-top-color:#1890ff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:8px}

.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.search-bar input:focus,.search-bar select:focus{border-color:#1890ff}
.search-bar input{flex:1;min-width:120px}
.search-bar select{min-width:100px}

@media(min-width:768px){.page{padding:20px;max-width:960px;margin:0 auto}.stats{grid-template-columns:repeat(4,1fr)}}
@media print{.header,.nav,.btn,.toolbar,.search-bar,.status-bar{display:none}}
</style>
</head>
<body>
<div id="app"><div class="login-box"><h2>💧 水站管理</h2><div class="sub">选择角色登录</div><div class="role-btns" id="rb"></div><div class="form-group"><input type="text" id="uname" placeholder="用户名" autocomplete="off"></div><div class="form-group"><input type="password" id="upwd" placeholder="密码"></div><button class="btn btn-blue btn-block" id="loginBtn" onclick="doLogin()">登 录</button><p style="text-align:center;font-size:12px;color:#999;margin-top:12px" id="hint"></p></div></div>
<div class="toast-container" id="toastContainer"></div>

<script>
var API='';
var user=null,orders=[],customers=[],products=[],currentPage='orders',orderStatusFilter='';
var roles=[{id:'sales',icon:'📋',name:'销售',desc:'订单客户'},{id:'warehouse',icon:'📦',name:'仓管',desc:'备货配送'},{id:'delivery',icon:'🚚',name:'送水工',desc:'接单配送'}];
var selectedRole='sales';
var statusLabels={pending:'待接单',ready:'已备货',delivering:'配送中',done:'已完成',cancelled:'已取消'};
var statuses=['pending','ready','delivering','done','cancelled'];
var debounceTimer=null;

function escapeHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg,type){type=type||'info';var c=document.getElementById('toastContainer');var t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;t.onclick=function(){t.remove();};c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3500);}
function formatPhone(p){if(!p||p==='无')return'无';var s=String(p);if(s.length===11)return s.slice(0,3)+'****'+s.slice(7);return s;}

// ====== API ======
async function api(url,opts){
  opts=opts||{};
  var o={headers:{'Content-Type':'application/json'}};
  if(opts.method)o.method=opts.method;
  if(opts.body)o.body=JSON.stringify(opts.body);
  var r=await fetch(API+url,o);
  var d=await r.json().catch(function(){return{};});
  if(!r.ok)throw new Error(d.error||'请求失败 ('+r.status+')');
  return d;
}

// ====== AUTH ======
function init(){
  var rb=document.getElementById('rb');
  roles.forEach(function(r){
    var b=document.createElement('button');
    b.className='role-btn'+(r.id===selectedRole?' selected':'');
    b.innerHTML=r.icon+'<br>'+r.name+'<br><small>'+r.desc+'</small>';
    b.onclick=function(){selectedRole=r.id;document.querySelectorAll('.role-btn').forEach(function(x){x.className='role-btn';});b.className='role-btn selected';};
    rb.appendChild(b);
  });
  document.getElementById('upwd').onkeydown=function(e){if(e.key==='Enter')doLogin();};
  document.getElementById('uname').onkeydown=function(e){if(e.key==='Enter')document.getElementById('upwd').focus();};
  var saved=localStorage.getItem('ws_user');
  if(saved){try{user=JSON.parse(saved);renderApp();return;}catch(e){localStorage.removeItem('ws_user');}}
}
init();

async function doLogin(){
  var u=document.getElementById('uname').value.trim();
  var p=document.getElementById('upwd').value;
  var hint=document.getElementById('hint');
  var btn=document.getElementById('loginBtn');
  if(!u||!p){hint.textContent='请输入用户名和密码';return;}
  hint.textContent='';btn.disabled=true;btn.textContent='登录中...';
  try{
    var d=await api('/api/login',{method:'POST',body:{username:u,password:p}});
    user=d.user;localStorage.setItem('ws_user',JSON.stringify(user));renderApp();
  }catch(e){hint.textContent=e.message;btn.disabled=false;btn.textContent='登 录';}
}

function logout(){
  if(!confirm('确定退出登录?'))return;
  localStorage.removeItem('ws_user');user=null;location.reload();
}

// ====== APP SHELL ======
function renderApp(){
  var app=document.getElementById('app');
  var navItems=user.role==='sales'?['订单','客户','产品','统计']:(user.role==='warehouse'?['订单','统计']:['订单','统计']);
  var pages=user.role==='sales'?['orders','customers','products','stats']:(user.role==='warehouse'?['orders','stats']:['orders','stats']);
  var roleInfo=roles.find(function(r){return r.id===user.role;});
  app.innerHTML='<div class="header"><div><h1>💧 水站管理</h1><span class="user">'+(roleInfo?roleInfo.icon:'')+' '+escapeHtml(user.real_name||user.username)+'</span></div><button onclick="logout()">退出</button></div>'+
    '<div class="nav">'+navItems.map(function(n,i){return '<button class="'+(i===0?'active':'')+'" onclick="switchPage(\''+pages[i]+'\',this)">'+n+'</button>';}).join('')+'</div>'+
    '<div id="page-orders" class="page active"></div><div id="page-customers" class="page"></div><div id="page-products" class="page"></div><div id="page-stats" class="page"></div>';
  loadOrders();
}

function switchPage(p,btn){
  currentPage=p;
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  var pg=document.getElementById('page-'+p);if(pg)pg.classList.add('active');
  document.querySelectorAll('.nav button').forEach(function(x){x.classList.remove('active');});
  if(btn)btn.classList.add('active');
  if(p==='orders')loadOrders();
  if(p==='customers')loadCustomers();
  if(p==='products')loadProducts();
  if(p==='stats')loadStats();
}

// ====== ORDERS ======
async function loadOrders(statusFilter){
  if(statusFilter!==undefined)orderStatusFilter=statusFilter;
  var q=document.getElementById('orderQ')?document.getElementById('orderQ').value:'';
  var st=orderStatusFilter||(document.getElementById('orderStatus')?document.getElementById('orderStatus').value:'');
  var page=document.getElementById('page-orders');
  page.innerHTML='<div class="loading">加载中</div>';
  try{orders=await api('/api/orders?q='+encodeURIComponent(q)+'&status='+encodeURIComponent(st));}
  catch(e){orders=[];showToast('加载订单失败: '+e.message,'error');}
  renderOrders();
}

function renderOrders(){
  var p=document.getElementById('page-orders');
  var statusCounts={};
  orders.forEach(function(o){statusCounts[o.status]=(statusCounts[o.status]||0)+1;});
  var actionBar=user.role==='sales'?'<div class="toolbar"><button class="btn btn-blue" onclick="newOrder()">+ 新建订单</button></div>':'';
  p.innerHTML=actionBar+
    '<div class="status-bar">'+
      statuses.map(function(s){
        var count=statusCounts[s]||0;
        var active=s===orderStatusFilter?' active':'';
        return '<div class="sb-item'+active+'" onclick="loadOrders(\''+s+'\')">'+statusLabels[s]+'<br><strong>'+count+'</strong></div>';
      }).join('')+
      '<div class="sb-item'+(orderStatusFilter?'':' active')+'" onclick="loadOrders(\'\')">全部<br><strong>'+orders.length+'</strong></div>'+
    '</div>'+
    '<div class="search-bar">'+
      '<select id="orderStatus" onchange="orderStatusFilter=\'\';loadOrders()"><option value="">全部状态</option>'+statuses.map(function(s){return '<option value="'+s+'">'+statusLabels[s]+'</option>';}).join('')+'</select>'+
      '<input id="orderQ" placeholder="搜索客户/电话/地址" oninput="debounceLoadOrders()">'+
      '<button class="btn btn-sm btn-gray" onclick="document.getElementById(\'orderQ\').value=\'\';document.getElementById(\'orderStatus\').value=\'\';orderStatusFilter=\'\';loadOrders();">重置</button>'+
    '</div>'+
    '<div class="card"><div class="table-wrap"><table><thead><tr><th>单号</th><th>日期</th><th>客户</th><th>电话</th><th>地址</th><th>商品</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>'+
    (orders.length===0
      ?'<tr><td colspan="9"><div class="empty-state"><div class="icon">📭</div><p>暂无订单</p></div></td></tr>'
      :orders.map(function(o){
        var items=typeof o.items==='string'?JSON.parse(o.items):(o.items||[]);
        var itemStr=items.map(function(i){return escapeHtml(i.name)+'×'+i.qty;}).join(', ')||'-';
        return '<tr><td><strong>'+escapeHtml(o.id)+'</strong></td>'+
          '<td>'+escapeHtml(o.date||'-')+'</td>'+
          '<td>'+escapeHtml(o.customer_name||'-')+'</td>'+
          '<td>'+escapeHtml(formatPhone(o.phone))+'</td>'+
          '<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escapeHtml(o.address||'')+'">'+escapeHtml(o.address||'-')+'</td>'+
          '<td>'+itemStr+'</td>'+
          '<td><strong>¥'+(o.total||0).toFixed(2)+'</strong></td>'+
          '<td><span class="badge badge-'+o.status+'">'+(statusLabels[o.status]||o.status)+'</span></td>'+
          '<td style="white-space:nowrap">'+getOrderActions(o)+'</td></tr>';
      }).join(''))+
    '</tbody></table></div></div>';
}

function debounceLoadOrders(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(function(){loadOrders();},400);
}

function getOrderActions(o){
  var a=[];
  if(user.role==='sales'){if(o.status==='pending')a.push('<button class="btn btn-sm btn-red" onclick="cancelOrder(\''+escapeHtml(o.id)+'\')">取消</button>');}
  if(user.role==='warehouse'){if(o.status==='pending')a.push('<button class="btn btn-sm btn-green" onclick="prepareOrder(\''+escapeHtml(o.id)+'\')">备货</button>');}
  if(user.role==='delivery'){
    if(o.status==='ready')a.push('<button class="btn btn-sm btn-blue" onclick="takeOrder(\''+escapeHtml(o.id)+'\')">接单</button>');
    if(o.status==='delivering')a.push('<button class="btn btn-sm btn-green" onclick="doneOrder(\''+escapeHtml(o.id)+'\')">完成</button>');
  }
  return a.join(' ')||'<span style="color:#999">-</span>';
}

async function cancelOrder(id){if(!confirm('确定取消订单 '+id+' ?'))return;try{await api('/api/orders/'+encodeURIComponent(id)+'/status',{method:'PATCH',body:{status:'cancelled'}});showToast('订单已取消','success');loadOrders();}catch(e){showToast('操作失败: '+e.message,'error');}}
async function prepareOrder(id){if(!confirm('确认备货订单 '+id+' ?'))return;try{await api('/api/orders/'+encodeURIComponent(id)+'/status',{method:'PATCH',body:{status:'ready'}});showToast('已备货','success');loadOrders();}catch(e){showToast('操作失败: '+e.message,'error');}}
async function takeOrder(id){if(!confirm('确认接单 '+id+' ?'))return;try{await api('/api/orders/'+encodeURIComponent(id)+'/status',{method:'PATCH',body:{status:'delivering'}});showToast('已接单','success');loadOrders();}catch(e){showToast('操作失败: '+e.message,'error');}}
async function doneOrder(id){if(!confirm('确认完成订单 '+id+' ?'))return;try{await api('/api/orders/'+encodeURIComponent(id)+'/status',{method:'PATCH',body:{status:'done'}});showToast('订单已完成','success');loadOrders();}catch(e){showToast('操作失败: '+e.message,'error');}}

// ====== NEW ORDER ======
function newOrder(){
  var p=document.getElementById('page-orders');
  p.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="orderModal" onclick="if(event.target===this)closeModal(\'orderModal\')"><div class="modal-content"><h3>📋 新建订单</h3>'+
    '<div class="form-group"><label>选择客户 <span style="color:#ff4d4f">*</span></label><div style="display:flex;gap:8px"><select id="ocselect" onchange="onCustomerSelect()" style="flex:1"><option value="">-- 选择已有客户 --</option></select><button class="btn btn-sm btn-blue" onclick="newCustomerFromOrder()" style="white-space:nowrap">+ 新增</button></div></div>'+
    '<div id="ocManualFields">'+
      '<div class="form-group"><label>客户名称 <span style="color:#ff4d4f">*</span></label><input id="ocname" placeholder="输入客户名称"></div>'+
      '<div class="form-group"><label>电话 <span style="color:#ff4d4f">*</span></label><input id="ocphone" placeholder="手机号码" type="tel"></div>'+
      '<div class="form-group"><label>地址 <span style="color:#ff4d4f">*</span></label><input id="ocaddr" placeholder="配送地址"></div>'+
    '</div>'+
    '<div class="form-group"><label>备注</label><input id="ocremark" placeholder="备注信息（可选）"></div>'+
    '<div class="form-group"><label>商品 <span style="color:#ff4d4f">*</span></label><div id="orderItems"></div><button class="btn btn-sm btn-blue" onclick="addOrderItem()" style="margin-top:4px">+ 添加商品</button></div>'+
    '<div id="orderTotal" style="text-align:right;font-size:16px;font-weight:700;margin-bottom:8px">合计: ¥0.00</div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-blue" onclick="submitOrder()" id="submitOrderBtn">提交订单</button><button class="btn btn-gray" onclick="closeModal(\'orderModal\')">取消</button></div>'+
    '</div></div>');
  loadDataForOrder();
}

// Auto-fill phone/address when a customer is selected
function onCustomerSelect(){
  var sel=document.getElementById('ocselect');
  var nameEl=document.getElementById('ocname');
  var phoneEl=document.getElementById('ocphone');
  var addrEl=document.getElementById('ocaddr');
  var manualDiv=document.getElementById('ocManualFields');
  if(!sel||!nameEl||!phoneEl||!addrEl)return;
  if(sel.value){
    // Existing customer selected: auto-fill and collapse manual fields
    var c=customers.find(function(x){return String(x.id)===String(sel.value);});
    if(c){
      nameEl.value=c.name||'';
      phoneEl.value=c.phone||'';
      addrEl.value=c.address||'';
    }
    if(manualDiv)manualDiv.style.display='none';
  }else{
    // "Select customer" or empty: show manual inputs
    nameEl.value='';
    phoneEl.value='';
    addrEl.value='';
    if(manualDiv)manualDiv.style.display='block';
  }
}

// Quick-add a customer from the order modal
function newCustomerFromOrder(){
  var p=document.getElementById('page-orders');
  p.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="custFromOrderModal" onclick="if(event.target===this)closeModal(\'custFromOrderModal\')" style="z-index:101"><div class="modal-content"><h3>👤 快速新增客户</h3>'+
    '<div class="form-group"><label>客户名称 <span style="color:#ff4d4f">*</span></label><input id="nconame" placeholder="输入客户名称"></div>'+
    '<div class="form-group"><label>电话</label><input id="ncophone" placeholder="手机号码" type="tel"></div>'+
    '<div class="form-group"><label>地址</label><input id="ncoaddr" placeholder="地址"></div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-blue" onclick="submitCustomerFromOrder()">保存并选择</button><button class="btn btn-gray" onclick="closeModal(\'custFromOrderModal\')">取消</button></div></div></div>');
}

async function submitCustomerFromOrder(){
  var name=document.getElementById('nconame')?document.getElementById('nconame').value.trim():'';
  var phone=document.getElementById('ncophone')?document.getElementById('ncophone').value.trim():'';
  var addr=document.getElementById('ncoaddr')?document.getElementById('ncoaddr').value.trim():'';
  if(!name)return showToast('请输入客户名称','warning');
  try{
    await api('/api/customers',{method:'POST',body:{name:name,phone:phone,address:addr}});
    closeModal('custFromOrderModal');
    showToast('客户添加成功','success');
    // Reload customers and refresh the dropdown
    await loadCustomersForSelect();
    // Select the newly added customer (last in list)
    var sel=document.getElementById('ocselect');
    if(sel){sel.value=String(customers[customers.length-1].id);onCustomerSelect();}
  }catch(e){showToast('添加失败: '+e.message,'error');}
}

async function loadCustomersForSelect(){
  try{customers=await api('/api/customers');}
  catch(e){customers=[];}
  var sel=document.getElementById('ocselect');
  if(!sel)return;
  var currentVal=sel.value;
  sel.innerHTML='<option value="">-- 选择已有客户 --</option>'+customers.map(function(c){
    var info=[c.name,c.phone?'📞'+c.phone:'',c.address?'📍'+c.address:''].filter(Boolean).join(' | ');
    return '<option value="'+c.id+'">'+escapeHtml(info)+'</option>';
  }).join('');
  sel.value=currentVal;
}

async function loadDataForOrder(){
  try{products=await api('/api/products');}catch(e){products=[];showToast('加载产品失败','error');}
  try{customers=await api('/api/customers');}catch(e){customers=[];}
  // Populate customer dropdown
  var sel=document.getElementById('ocselect');
  if(sel){
    sel.innerHTML='<option value="">-- 选择已有客户 --</option>'+customers.map(function(c){
      var info=[c.name,c.phone?'📞'+c.phone:'',c.address?'📍'+c.address:''].filter(Boolean).join(' | ');
      return '<option value="'+c.id+'">'+escapeHtml(info)+'</option>';
    }).join('');
  }
  addOrderItem();
}

function closeModal(id){var el=document.getElementById(id);if(el)el.remove();}
var orderItemIdx=0;

function addOrderItem(){
  var d=document.getElementById('orderItems');
  var idx=orderItemIdx;
  var options=products.map(function(p){return '<option value="'+escapeHtml(p.id)+'">'+escapeHtml(p.name)+' - ¥'+p.price.toFixed(2)+' ('+escapeHtml(p.spec||'')+')</option>';}).join('');
  d.insertAdjacentHTML('beforeend','<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center" id="oi'+idx+'"><select id="oip'+idx+'" style="flex:1" onchange="updateOrderTotal()">'+options+'</select>'+
    '<input id="oiq'+idx+'" type="number" value="1" min="1" max="999" style="width:70px" onchange="updateOrderTotal()" oninput="this.value=this.value.replace(/[^0-9]/g,\'\')">'+
    '<button class="btn btn-sm btn-red" onclick="document.getElementById(\'oi'+idx+'\').remove();updateOrderTotal()" title="移除">✕</button></div>');
  orderItemIdx++;
  updateOrderTotal();
}

function getOrderItemsFromForm(){
  var items=[];
  for(var i=0;i<orderItemIdx;i++){
    var sel=document.getElementById('oip'+i);if(!sel)continue;
    var qty=parseInt(document.getElementById('oiq'+i)?document.getElementById('oiq'+i).value:1)||1;
    var p=products.find(function(x){return x.id===sel.value;});
    if(p)items.push({id:p.id,name:p.name,price:p.price,qty:Math.min(qty,999)});
  }
  return items;
}

function updateOrderTotal(){
  var items=getOrderItemsFromForm();
  var total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
  var el=document.getElementById('orderTotal');
  if(el)el.textContent='合计: ¥'+total.toFixed(2);
}

async function submitOrder(){
  var name=document.getElementById('ocname')?document.getElementById('ocname').value.trim():'';
  var phone=document.getElementById('ocphone')?document.getElementById('ocphone').value.trim():'';
  var addr=document.getElementById('ocaddr')?document.getElementById('ocaddr').value.trim():'';
  var remark=document.getElementById('ocremark')?document.getElementById('ocremark').value.trim():'';
  if(!name)return showToast('请输入客户名称','warning');
  if(!phone)return showToast('请输入电话号码','warning');
  if(!/^[\d\-+() ]{7,15}$/.test(phone))return showToast('请输入有效的电话号码','warning');
  if(!addr)return showToast('请输入配送地址','warning');
  var items=getOrderItemsFromForm();
  if(items.length===0)return showToast('请至少添加一个商品','warning');
  var total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
  var btn=document.getElementById('submitOrderBtn');btn.disabled=true;btn.textContent='提交中...';
  try{
    await api('/api/orders',{method:'POST',body:{customerName:name,phone:phone,address:addr,remark:remark,items:items,total:total}});
    closeModal('orderModal');showToast('订单创建成功','success');loadOrders();
  }catch(e){showToast('创建失败: '+e.message,'error');btn.disabled=false;btn.textContent='提交订单';}
}

// ====== CUSTOMERS ======
async function loadCustomers(){
  var q=document.getElementById('custQ')?document.getElementById('custQ').value:'';
  var page=document.getElementById('page-customers');
  page.innerHTML='<div class="loading">加载中</div>';
  try{customers=await api('/api/customers?q='+encodeURIComponent(q));}
  catch(e){customers=[];showToast('加载客户失败: '+e.message,'error');}
  renderCustomers();
}

function renderCustomers(){
  var p=document.getElementById('page-customers');
  p.innerHTML='<div class="toolbar"><button class="btn btn-blue btn-sm" onclick="newCustomer()">+ 新增客户</button><span style="font-size:12px;color:#999;margin-left:auto">共 '+customers.length+' 个客户</span></div>'+
    '<div class="search-bar"><input id="custQ" placeholder="搜索客户名称/电话" oninput="debounceLoadCustomers()"><button class="btn btn-sm btn-gray" onclick="document.getElementById(\'custQ\').value=\'\';loadCustomers();">重置</button></div>'+
    (customers.length===0
      ?'<div class="empty-state"><div class="icon">👥</div><p>暂无客户数据</p></div>'
      :customers.map(function(c){return '<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+escapeHtml(c.name)+'</strong><br><small>📞 '+escapeHtml(c.phone||'无')+' | 📍 '+escapeHtml(c.address||'无')+'</small></div><button class="btn btn-sm btn-red" onclick="delCustomer('+c.id+',\''+escapeHtml(c.name)+'\')">删除</button></div>';}).join(''));
}

function debounceLoadCustomers(){clearTimeout(debounceTimer);debounceTimer=setTimeout(function(){loadCustomers();},400);}

function newCustomer(){
  var p=document.getElementById('page-customers');
  p.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="custModal" onclick="if(event.target===this)closeModal(\'custModal\')"><div class="modal-content"><h3>👤 新增客户</h3>'+
    '<div class="form-group"><label>客户名称 <span style="color:#ff4d4f">*</span></label><input id="ncname" placeholder="输入客户名称"></div>'+
    '<div class="form-group"><label>电话</label><input id="ncphone" placeholder="手机号码" type="tel"></div>'+
    '<div class="form-group"><label>地址</label><input id="ncaddr" placeholder="地址"></div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-blue" onclick="submitCustomer()">保存</button><button class="btn btn-gray" onclick="closeModal(\'custModal\')">取消</button></div></div></div>');
}

async function submitCustomer(){
  var name=document.getElementById('ncname')?document.getElementById('ncname').value.trim():'';
  var phone=document.getElementById('ncphone')?document.getElementById('ncphone').value.trim():'';
  var addr=document.getElementById('ncaddr')?document.getElementById('ncaddr').value.trim():'';
  if(!name)return showToast('请输入客户名称','warning');
  try{await api('/api/customers',{method:'POST',body:{name:name,phone:phone,address:addr}});closeModal('custModal');showToast('客户添加成功','success');loadCustomers();}
  catch(e){showToast('添加失败: '+e.message,'error');}
}

async function delCustomer(id,name){
  if(!confirm('确定删除客户 "'+name+'" ?\n\n注意: 删除后不可恢复，已有订单中的客户信息不受影响。'))return;
  try{await api('/api/customers/'+encodeURIComponent(id),{method:'DELETE'});showToast('客户已删除','success');loadCustomers();}
  catch(e){showToast('删除失败: '+e.message,'error');}
}

// ====== PRODUCTS ======
async function loadProducts(){
  var page=document.getElementById('page-products');
  page.innerHTML='<div class="loading">加载中</div>';
  try{products=await api('/api/products');}catch(e){products=[];showToast('加载产品失败: '+e.message,'error');}
  renderProducts();
}

function renderProducts(){
  var p=document.getElementById('page-products');
  p.innerHTML='<div class="toolbar"><button class="btn btn-blue btn-sm" onclick="newProduct()">+ 新增产品</button><span style="font-size:12px;color:#999;margin-left:auto">共 '+products.length+' 个产品</span></div>'+
    (products.length===0
      ?'<div class="empty-state"><div class="icon">📦</div><p>暂无产品</p></div>'
      :products.map(function(pr){return '<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div><strong>'+escapeHtml(pr.name)+'</strong><br><small>规格: '+escapeHtml(pr.spec||'-')+' | 类型: '+(pr.type==='bucket'?'🪣 桶装':'🍾 瓶装')+'</small></div><div style="text-align:right"><strong style="font-size:16px;color:#1890ff">¥'+(pr.price||0).toFixed(2)+'</strong><br><button class="btn btn-sm btn-red" onclick="delProduct(\''+escapeHtml(pr.id)+'\',\''+escapeHtml(pr.name)+'\')">删除</button></div></div>';}).join(''));
}

function newProduct(){
  var p=document.getElementById('page-products');
  p.insertAdjacentHTML('beforeend','<div class="modal-overlay" id="prodModal" onclick="if(event.target===this)closeModal(\'prodModal\')"><div class="modal-content"><h3>📦 新增产品</h3>'+
    '<div class="form-group"><label>产品名称 <span style="color:#ff4d4f">*</span></label><input id="npname" placeholder="如: 15L桶装水"></div>'+
    '<div class="form-group"><label>规格</label><input id="npspec" placeholder="如: 15L"></div>'+
    '<div class="form-group"><label>价格 <span style="color:#ff4d4f">*</span></label><input id="npprice" type="number" step="0.01" min="0" placeholder="0.00"></div>'+
    '<div class="form-group"><label>类型</label><select id="nptype"><option value="bucket">🪣 桶装水</option><option value="bottle">🍾 瓶装水</option></select></div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-blue" onclick="submitProduct()">保存</button><button class="btn btn-gray" onclick="closeModal(\'prodModal\')">取消</button></div></div></div>');
}

async function submitProduct(){
  var name=document.getElementById('npname')?document.getElementById('npname').value.trim():'';
  var spec=document.getElementById('npspec')?document.getElementById('npspec').value.trim():'';
  var price=parseFloat(document.getElementById('npprice')?document.getElementById('npprice').value:'0');
  var type=document.getElementById('nptype')?document.getElementById('nptype').value:'bucket';
  if(!name)return showToast('请输入产品名称','warning');
  if(isNaN(price)||price<0)return showToast('请输入有效价格','warning');
  var id='p'+Date.now();
  try{await api('/api/products',{method:'POST',body:{id:id,name:name,spec:spec,price:price,type:type}});closeModal('prodModal');showToast('产品添加成功','success');loadProducts();}
  catch(e){showToast('添加失败: '+e.message,'error');}
}

async function delProduct(id,name){
  if(!confirm('确定删除产品 "'+name+'" ?\n\n注意: 删除后不可恢复，如有关联订单可能显示异常。'))return;
  try{await api('/api/products/'+encodeURIComponent(id),{method:'DELETE'});showToast('产品已删除','success');loadProducts();}
  catch(e){showToast('删除失败: '+e.message,'error');}
}

// ====== STATS ======
async function loadStats(){
  var p=document.getElementById('page-stats');
  p.innerHTML='<div class="loading">加载中</div>';
  try{var d=await api('/api/stats');renderStats(d);}
  catch(e){p.innerHTML='<div class="empty-state"><div class="icon">📊</div><p>加载统计失败: '+escapeHtml(e.message)+'</p></div>';}
}

function renderStats(d){
  var p=document.getElementById('page-stats');
  p.innerHTML='<div class="stats"><div class="stat blue"><div class="val">'+(d.todayOrders||0)+'</div><div class="lbl">今日订单</div></div>'+
    '<div class="stat green"><div class="val">¥'+(d.todayRevenue||0).toFixed(2)+'</div><div class="lbl">今日营收</div></div>'+
    '<div class="stat orange"><div class="val">'+(d.pending||0)+'</div><div class="lbl">待接单</div></div>'+
    '<div class="stat red"><div class="val">'+(d.delivering||0)+'</div><div class="lbl">配送中</div></div></div>'+
    '<div class="card" style="margin-top:12px"><h4 style="margin-bottom:12px">📊 累计统计</h4><table style="min-width:auto">'+
    '<tr><td style="width:40%;color:#666">总订单</td><td><strong>'+(d.totalOrders||0)+'</strong></td></tr>'+
    '<tr><td style="color:#666">已完成</td><td><strong style="color:#389e0d">'+(d.doneCount||0)+'</strong></td></tr>'+
    '<tr><td style="color:#666">已备货待配送</td><td><strong style="color:#1890ff">'+(d.ready||0)+'</strong></td></tr>'+
    '<tr><td style="color:#666">总营收</td><td><strong style="font-size:18px;color:#1890ff">¥'+(d.totalRevenue||0).toFixed(2)+'</strong></td></tr>'+
    '</table></div>';
}
